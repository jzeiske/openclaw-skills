<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a0b;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .deck {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  .slide {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
    text-align: center;
    animation: fadeIn 0.6s ease-out;
  }
  .slide.active { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .headline {
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 30px;
    max-width: 900px;
  }
  .accent { color: #34d399; }
  .accent-red { color: #f87171; }
  .subhead {
    font-size: 20px;
    color: #999;
    max-width: 650px;
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .metrics {
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .metric {
    text-align: center;
    min-width: 180px;
  }
  .metric .value {
    font-size: clamp(48px, 7vw, 72px);
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
  }
  .metric .label {
    font-size: 16px;
    color: #888;
    margin-top: 8px;
    font-weight: 500;
  }
  .big-number {
    font-size: clamp(64px, 10vw, 120px);
    font-weight: 900;
    line-height: 1;
    margin-bottom: 10px;
  }
  .big-number.red { color: #f87171; }
  .big-number.green { color: #34d399; }
  .big-number-label {
    font-size: 18px;
    color: #777;
    max-width: 550px;
  }
  .compare {
    display: flex;
    gap: 40px;
    align-items: stretch;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
  }
  .compare-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 40px 48px;
    min-width: 280px;
    max-width: 380px;
    text-align: center;
  }
  .compare-card.highlight {
    background: #0d1f17;
    border-color: #34d39944;
  }
  .compare-label {
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 12px;
    color: #666;
    margin-bottom: 16px;
    font-weight: 600;
  }
  .compare-value {
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .compare-card.highlight .compare-value { color: #34d399; }
  .compare-sub {
    font-size: 15px;
    color: #777;
    margin-top: 10px;
  }
  .bullets {
    list-style: none;
    text-align: left;
    max-width: 700px;
    margin-top: 20px;
  }
  .bullets li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 19px;
    line-height: 1.4;
  }
  .bullets li:last-child { border-bottom: none; }
  .check { color: #34d399; font-weight: 700; font-size: 20px; flex-shrink: 0; }
  .investment {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
  }
  .invest-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 36px 44px;
    text-align: center;
    min-width: 240px;
  }
  .invest-amount {
    font-size: 48px;
    font-weight: 900;
    color: #34d399;
    line-height: 1.1;
  }
  .invest-period {
    font-size: 15px;
    color: #777;
    margin-top: 10px;
  }
  .guarantee {
    margin-top: 40px;
    padding: 20px 32px;
    background: #0d1f17;
    border: 1px solid #34d39922;
    border-radius: 12px;
    max-width: 600px;
    font-size: 17px;
    color: #a0a0a0;
    line-height: 1.5;
  }
  .guarantee strong { color: #34d399; }
  .nav-hint {
    position: fixed;
    bottom: 24px;
    right: 32px;
    font-size: 12px;
    color: #444;
    font-weight: 500;
  }
  .progress {
    position: fixed;
    bottom: 24px;
    left: 32px;
    display: flex;
    gap: 8px;
  }
  .progress-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #222;
    transition: background 0.3s;
  }
  .progress-dot.on { background: #34d399; }
  @media (max-width: 768px) {
    .slide { padding: 32px 24px; }
    .metrics { gap: 28px; }
    .compare { gap: 20px; }
    .compare-card { padding: 24px 20px; min-width: unset; max-width: unset; flex: 1; }
  }
</style>
</head>
<body>
<div class="deck" id="deck">
  SLIDES_PLACEHOLDER
</div>
<div class="progress" id="progress"></div>
<div class="nav-hint">← → to navigate</div>
<script>
(function() {
  var slides = document.querySelectorAll('.slide');
  var progress = document.getElementById('progress');
  var idx = 0;
  slides.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'progress-dot' + (i === 0 ? ' on' : '');
    progress.appendChild(d);
  });
  function show(n) {
    slides[idx].classList.remove('active');
    progress.children[idx].classList.remove('on');
    idx = ((n % slides.length) + slides.length) % slides.length;
    slides[idx].classList.add('active');
    progress.children[idx].classList.add('on');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); show(idx + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); show(idx - 1); }
  });
  document.addEventListener('click', function() { show(idx + 1); });
})();
</script>
</body>
</html>
